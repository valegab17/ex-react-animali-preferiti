<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css">

    <!-- monto react all'interno della pagina HTML -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- creazione componente react -->
    <script type="text/babel">
        function Modal({

            title,

            content,

            show = false,

            onClose = () => { },
            onConfirm = () => { }

        }) {

            return show && ReactDOM.createPortal(

                <div className="modal-container">

                    <div className="modal">

                        <h2>{title}</h2>

                        <p>{content}</p>

                        <div>
                            <button onClick={onClose}>Annulla</button>
                            <button onClick={onConfirm}>Conferma</button>

                        </div>


                    </div>

                </div>,

                document.body

            )

        }

        const ReactApp = () => {
            //monto useState
            const { useState } = React;


            // Trasforma l’array animals usando useState (l’array è inizialmente vuoto).
            const [animals, setAnimals] = useState([]);
            const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];

            //creo un altro state show setShow
            const [show, setShow] = useState(false);

            //creo un altro state
            const [animalName, setAnimalName] = useState('')

            //creo una funzione da usare nel bottone
            function addAnimals() {
                if(!animalName) return;
                setAnimals(curr=> [...curr, animalName]);
                setAnimalName('');
                setShow(false);

            }

            /* const animals = ['cane', 'gatto', 'cavallo'] */

            return (
                <>

                    <button onClick={() => setShow(true)}>Aggiungi animale</button>
                    <details>
                        <summary>Lista dei miei animali Preferiti</summary>
                        <ul>
                            {animals.map((animali, index) => <li key={index}>{animali}</li>)}

                        </ul>
                    </details>
                    <Modal
                        show={show}
                        onClose={() => setShow(false)}
                        onConfirm={addAnimals}
                        title="Aggiungi animale"
                        content={
                            <input
                                type="text"
                                value={animalName}
                                onChange = {e => setAnimalName(e.target.value)}


                            />
                        }
                    />

                </>

            )
        }
    </script>
    <script type="text/babel">
        const { createRoot } = ReactDOM;
        //seleziono il div nel body .lista-animali
        const listaAnimali = document.querySelector('.lista-animali')
        const root = createRoot(listaAnimali)
        root.render(<ReactApp />)
    </script>
</head>

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>

</body>

</html>
